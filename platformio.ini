; ============================================================
; MeshCore Standalone Companion — Heltec Vision Master E290
; Wyświetlacz: E-Ink 2.9" 296x128 (DEPG0290BNS800F6)
; Klawiatura:  CardKB (I2C 0x5F)
; Radio:       SX1262 (EU 868 MHz Narrow)
; MCU:         ESP32-S3R8
; ============================================================

[platformio]
default_envs = VME290_companion

; ── Wspólna baza ESP32-S3 ───────────────────────────────────
[esp32s3_base]
platform  = espressif32
framework = arduino
board     = esp32-s3-devkitc-1
board_build.mcu        = esp32s3
board_build.f_cpu      = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    -DCORE_DEBUG_LEVEL=0

lib_deps =
    ; MeshCore – zamieniamy na fork z obsługą E290 lub lokalny src
    ; RadioLib do LoRa SX1262
    jgromes/RadioLib @ ^6.6.0
    ; E-Ink display
    ZinggJM/GxEPD2 @ ^1.6.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    ; I2C CardKB
    Wire
    ; Kryptografia MeshCore
    rweather/Crypto @ ^0.4.0

; ── Wariant płytki VME290 ────────────────────────────────────
[VME290_base]
extends = esp32s3_base

build_flags =
    ${esp32s3_base.build_flags}
    -I variants/heltec_vme290
    ; ─ Identyfikacja sprzętu
    -D HELTEC_VME290=1
    ; ─ E-Ink SPI pins (z schematu HT-VME290 v0.3.x)
    -D EPD_CS=21
    -D EPD_DC=22
    -D EPD_RST=23
    -D EPD_BUSY=24
    -D EPD_MOSI=48
    -D EPD_SCLK=47
    -D EPD_MISO=-1
    ; ─ LoRa SX1262 SPI pins
    -D LORA_NSS=8
    -D LORA_SCK=9
    -D LORA_MOSI=10
    -D LORA_MISO=11
    -D LORA_RST=12
    -D LORA_BUSY=13
    -D LORA_DIO1=14
    ; ─ Radio — EU 868 MHz Narrow (MeshCore EU/UK Narrow)
    -D LORA_FREQ=868100000
    -D LORA_BW=125.0
    -D LORA_SF=11
    -D LORA_CR=8
    -D LORA_TX_POWER=20
    ; ─ CardKB I2C
    -D CARDKB_SDA=17
    -D CARDKB_SCL=18
    -D CARDKB_ADDR=0x5F
    ; ─ Bateria ADC
    -D BATTERY_ADC_PIN=1
    ; ─ Przycisk BOOT (GPIO 0)
    -D BUTTON_PIN=0
    ; ─ UI — tryb E-Ink standalone
    -D UI_STANDALONE=1
    -D DISPLAY_WIDTH=296
    -D DISPLAY_HEIGHT=128

; ── Środowisko budowania ─────────────────────────────────────
[env:VME290_companion]
extends = VME290_base

build_flags =
    ${VME290_base.build_flags}
    -D FIRMWARE_ROLE_COMPANION=1

build_src_filter =
    +<*>
    +<../variants/heltec_vme290/>

lib_deps =
    ${esp32s3_base.lib_deps}

extra_scripts = pre:scripts/set_version.py

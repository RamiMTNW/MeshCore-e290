[platformio]
default_envs = VME290_companion

[env:VME290_companion]
platform  = espressif32
framework = arduino
board     = esp32-s3-devkitc-1
board_build.mcu        = esp32s3
board_build.f_cpu      = 240000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = default_8MB.csv
board_upload.flash_size = 8MB
upload_speed   = 921600
monitor_speed  = 115200

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DCORE_DEBUG_LEVEL=0
    -I variants/heltec_vme290
    -D HELTEC_VME290=1
    -D EPD_CS=21
    -D EPD_DC=22
    -D EPD_RST=23
    -D EPD_BUSY=24
    -D EPD_MOSI=48
    -D EPD_SCLK=47
    -D EPD_MISO=-1
    -D LORA_NSS=8
    -D LORA_SCK=9
    -D LORA_MOSI=10
    -D LORA_MISO=11
    -D LORA_RST=12
    -D LORA_BUSY=13
    -D LORA_DIO1=14
    -D LORA_FREQ=868100000
    -D LORA_BW=125.0
    -D LORA_SF=11
    -D LORA_CR=8
    -D LORA_TX_POWER=20
    -D CARDKB_SDA=17
    -D CARDKB_SCL=18
    -D CARDKB_ADDR=0x5F
    -D BATTERY_ADC_PIN=1
    -D BUTTON_PIN=0
    -D DISPLAY_WIDTH=296
    -D DISPLAY_HEIGHT=128

build_src_filter =
    +<*>
    +<../variants/heltec_vme290/>

lib_deps =
    jgromes/RadioLib @ ^6.6.0
    ZinggJM/GxEPD2 @ ^1.6.9
    adafruit/Adafruit GFX Library @ ^1.11.9
    Wire
    rweather/Crypto @ ^0.4.0

name: Build MeshCore E290 Firmware

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e VME290_companion

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: meshcore-e290-firmware
          path: .pio/build/VME290_companion/firmware.bin
          retention-days: 30
